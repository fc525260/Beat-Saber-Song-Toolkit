name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: apps/beat_saber_song_toolkit_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test focused smoke
        run: flutter test test/widget_test.dart --plain-name "shows update dialog from configured release API"

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows release
        shell: pwsh
        run: |
          $release = "build/windows/x64/runner/Release"
          $zip = "Beat-Saber-Song-Toolkit-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$release/*" -DestinationPath $zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Beat-Saber-Song-Toolkit-windows-x64
          path: apps/beat_saber_song_toolkit_app/Beat-Saber-Song-Toolkit-windows-x64.zip
